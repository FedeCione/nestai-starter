services:
  db:
    image: postgres:16-alpine
    container_name: nestai-starter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nestai
      POSTGRES_PASSWORD: nestai
      POSTGRES_DB: nestai
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nestai -d nestai']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
